kind = "web"
previewPath = "/"
title = "Dunwell Youth Priority Clinic"
version = "1.0.0"
id = "artifacts/dunwell"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26173

[services.development]
run = "pnpm --filter @workspace/dunwell run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dunwell", "run", "build" ]
publicDir = "artifacts/dunwell/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26173"
BASE_PATH = "/"
